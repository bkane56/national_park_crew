# Keeps the free Hugging Face Space awake by pinging it before the ~48h inactivity sleep.
# Note: this workflow does NOT deploy code updates to Hugging Face.
# Portfolio tile URL: https://huggingface.co/spaces/Bkane56/national-park-trip-planner
name: Keep HF Space alive

on:
  schedule:
    # Every 12 hours (UTC) on default branch (main) — under HF's ~48h sleep window
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/keep-hf-space-alive.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        env:
          HF_SPACE_URL: https://huggingface.co/spaces/Bkane56/national-park-trip-planner
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          set -euo pipefail
          auth_args=()
          if [ -n "${HF_API_TOKEN:-}" ]; then
            auth_args=(-H "Authorization: Bearer ${HF_API_TOKEN}")
          fi
          # Do not use curl -f: we need the HTTP status even on 401/404
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 120 \
            "${auth_args[@]}" \
            "$HF_SPACE_URL" || echo "000")
          echo "HTTP $code from $HF_SPACE_URL"
          case "$code" in
            200|301|302|303|307|308|401|403)
              echo "Space responded (ok for keep-alive ping)."
              exit 0
              ;;
            *)
              echo "Unexpected status. If the Space is private, add HF_API_TOKEN in repo secrets." >&2
              exit 1
              ;;
          esac
