general_research_task:
  description: >
    Using {trip} and the date of {current_date} as the context,
    Validate or revise the seeded departure locale {from}, arrival region {to}, gateway airports ({departure_city},
    {arrival_city}), and candidate parks scope {national_parks}. Produce a concrete plan for downstream tasks.
    Conduct a thorough research of national parks and commercial airports near a given location.
    Make sure you find all of the national parks which are within an eight hour drive of of that location.
    You must be able to find the arrival and departure dates of the trip, as well as the initial departure airport and 
    arrival airport. The arrival should be within a 2 hour drive of at least one of the national parks. 
    For the return trip the departure should be within a 2 hour drive of at least one of the national parks. 
    This may require a different departure airport than the initial arrival airport. The return arrival must be the 
    same as the initial departure airport.
    For example, if you are traveling from Tampa, Fl to Jackson, WY you would add Grand Teton National Park and Yellowstone
    National Park, then the best departure airport would be Boseman, MT airport. The return trip must end in Tampa, Fl.
    
    You must include:
    - a primary departure airport near {from} (or nearest practical commercial option),
    - a ranked list of 3-5 arrival airports near {to},
    - a recommended primary arrival airport for downstream planning,
    - the return departure airport recommendation.
    If {from} has no commercial airport, explicitly state that and provide nearest alternatives.
    Keep the airport scope relevant to the trip region; do not include unrelated long-haul/global airports.

  expected_output: >
    A structured list containing:
    1) Origin airport options near {from} with distance/drive-time notes,
    2) Arrival airport options near {to} with distance/drive-time notes,
    3) Selected outbound and return airports for flight research,
    4) National park shortlist and rationale.
  agent: general_researcher

flight_researcher_task:
  description: >
    Review the dates of travel and ONLY the departure/arrival airport candidates from the general research task.
    Use this information to find the best flight options. Keep in mind cost and total travel time.
    Hard constraints:
    - Departure airport must be one of the origin airport candidates.
    - Arrival airport must be one of the destination airport candidates.
    - Return flight must end at the selected origin airport/metro.
    - Exclude irrelevant routes (for example: unrelated countries/continents).
    Return a compact shortlist and mention how many off-scope options were discarded.
  expected_output: >
    A list of flights including the departure airport, the arrival airport, the times of departure and arrival, 
    and you must include the airline, flight number and the cost of the flight.
    Include only valid flights matching the scoped airport list.
  agent: flight_researcher

accommodation_researcher_task:
  description: >
    Determine the arrival location of the flight you got from the flight research task, as well as the national parks
    you got from the general research task.
    Use this information to find the best accommodations to stay at during your trip. Keep in mind cost and distance to 
    the park. This will likely involve multiple accommodations, as the trip may span multiple national parks. 
    The accommodations may be hotels, KEEP IN MIND that resorts, bed and breakfasts, or other accommodations are 
    acceptable.
    They may be either inside the park or near the park. But keep them reasonably close (10 to 20 miles) to the park.
  expected_output: >
    A list of accommodations including the name, location, per night cost, total cost, distance to the park, 
    and any other relevant information.
  agent: accommodation_researcher

national_park_researcher_task:
  description: >
    Review the context you got and plan a fun filled and engaging trip to the national parks you got from the 
    general research task.  This will likely involve multiple days in each park. Find the highes rated things to do
    in the park and determine the length of time needed for each activity.  Each park can and likely will require more
    than one day to complete.
    Make sure that each of the activities is in an order that makes sense for traveling within the park and to the 
    next park.
    The total trip length of all of the parks MUST be in the range of dates given for the trip as determined by the 
    arrival and departure dates of the flight.

  expected_output: >
    A list of parks, activities per park with recommended duration, sequencing that fits travel between parks within
    the trip window bounded by departure_date and return_date, and daily pacing notes where helpful.
  agent: national_park_researcher

reporting_writer_task:
  description: >
    Review the context you got and write an itinerary report based on the information you gathered from the other tasks.
    The report should be in markdown format and contain all of the information you gathered from the other tasks.
    You also should provide a of the itinerary as an excel spreadsheet in the same folder as the markdown report.
  expected_output: >
    A fully fledged report with the main topics, each with a full section of information.
    Formatted as markdown without '```'. If a file by that name exists, DO NOT OVERWRITE THE EXISTING FILE,  add the new
    file with a sequence number starting with 2. For example, itinerary_2.md, itinerary_3.md, etc..
  agent: reporting_writer
  output_file: itinerary/{departure_city}_to_{arrival_city}.md
